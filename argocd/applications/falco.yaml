apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    # Pin chart version; bump after testing upgrades (helm search repo falco --versions).
    targetRevision: 1.1.8
    helm:
      values: |
        driver:
          enabled: true
          # Explicit driver avoids "auto" + falcoctl mutating config (Argo CD drift).
          kind: modern_ebpf
        metrics:
          enabled: true
        serviceMonitor:
          create: true
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
