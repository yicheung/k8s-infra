# External Secrets Operator: GCP Secret Manager → Kubernetes Secret
# Use this file when running on GKE (GCP). Do not apply external-secret-aws.yaml on the same cluster.
# Prerequisites:
# 1. Create secret in GCP Secret Manager (e.g. "taskapp-config") with a JSON value:
#    {"DB_PASSWORD":"...","API_KEY":"...","JWT_SECRET":"..."}
#    Or create separate secrets per key and reference them in data[].remoteRef.key.
# 2. For GKE: use Workload Identity so the ESO controller can access Secret Manager;
#    or create a K8s secret with GCP service account key (not recommended for production).
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: YOUR_GCP_PROJECT_ID
      auth:
        # Option A: Workload Identity (recommended on GKE)
        # workloadIdentity:
        #   clusterLocation: us-central1
        #   clusterName: k8s-infra-cluster
        #   serviceAccountRef:
        #     name: external-secrets-sa
        #     namespace: external-secrets-system
        # Option B: Service account key in a K8s secret (for dev)
        secretRef:
          secretAccessKeySecretRef:
            name: gcp-secret-manager-credentials
            key: credentials
            namespace: external-secrets-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: taskapp-secrets
  namespace: taskapp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: taskapp-secrets
    creationPolicy: Owner
  data:
  - secretKey: DB_PASSWORD
    remoteRef:
      key: taskapp-config
      property: DB_PASSWORD
  - secretKey: API_KEY
    remoteRef:
      key: taskapp-config
      property: API_KEY
  - secretKey: JWT_SECRET
    remoteRef:
      key: taskapp-config
      property: JWT_SECRET
