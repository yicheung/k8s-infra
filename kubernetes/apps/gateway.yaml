# Gateway API: Gateway implemented by Cilium (EKS ALB/NLB or GKE LB)
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: taskapp-gateway
  namespace: taskapp
spec:
  gatewayClassName: cilium
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
