# External Secrets Operator: AWS Secrets Manager → Kubernetes Secret
# Use this file when running on EKS (AWS). Do not apply external-secret-gcp.yaml on the same cluster.
# Prerequisites:
# 1. Create secret in AWS Secrets Manager (e.g. name "taskapp/config") with keys:
#    DB_PASSWORD, API_KEY, JWT_SECRET (or a JSON object with these keys).
# 2. For EKS: prefer IRSA (IAM Role for Service Account) for the ESO controller;
#    or create a K8s secret "aws-secrets-manager-credentials" with accessKeyId and secretAccessKey.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        # Option A: IRSA (recommended on EKS) - ensure ESO controller has the right service account and IAM role
        # jwt:
        #   serviceAccountRef:
        #     name: external-secrets-sa
        #     namespace: external-secrets-system
        # Option B: Static credentials from a K8s secret (for dev or if not using IRSA)
        secretRef:
          accessKeyIDSecretRef:
            name: aws-secrets-manager-credentials
            key: accessKeyId
            namespace: external-secrets-system
          secretAccessKeySecretRef:
            name: aws-secrets-manager-credentials
            key: secretAccessKey
            namespace: external-secrets-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: taskapp-secrets
  namespace: taskapp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: taskapp-secrets
    creationPolicy: Owner
  data:
  - secretKey: DB_PASSWORD
    remoteRef:
      key: taskapp/config
      property: DB_PASSWORD
  - secretKey: API_KEY
    remoteRef:
      key: taskapp/config
      property: API_KEY
  - secretKey: JWT_SECRET
    remoteRef:
      key: taskapp/config
      property: JWT_SECRET
